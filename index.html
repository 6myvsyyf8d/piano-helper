<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="钢琴助手">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<title>🎹 哆哩的钢琴助手</title>
</head>

<body>
<div class="app">
  <!-- 头部 -->
  <div class="header" id="header">
    <div class="header-content">
      <div class="logo-area" id="logoArea" onclick="document.getElementById('logoInput').click()" title="更换头像">
        <img id="logoImg" src="" style="display:none" alt="Logo">
        <span class="logo-placeholder" id="logoPlaceholder">🎹</span>
      </div>
      <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">

      <div class="header-title">
        <h1>哆哩的钢琴助手</h1>
        <div class="header-subtitle" id="headerVersion">v3.4_20260620</div>
      </div>

      <div class="header-actions">
        <button class="sync-btn synced" id="syncBtn" onclick="showSyncPanel()" title="多设备同步">
          <span class="sync-icon">🔄</span>
          <span>同步</span>
        </button>
        <div class="streak-badge" id="streakBadge">
          <span class="streak-icon">🔥</span>
          <span id="streakCount">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main" id="mainContent">
    <div class="page active" id="page-today"></div>
    <div class="page" id="page-lessons"></div>
    <div class="page" id="page-calendar"></div>
    <div class="page" id="page-repertoire"></div>
    <div class="page" id="page-stats"></div>
  </div>

  <!-- 底部标签栏 -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="today">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">今日</span>
    </button>
    <button class="tab-btn" data-tab="lessons">
      <span class="tab-icon">📒</span>
      <span class="tab-label">课程</span>
    </button>
    <button class="tab-btn" data-tab="calendar">
      <span class="tab-icon">📅</span>
      <span class="tab-label">日历</span>
    </button>
    <button class="tab-btn" data-tab="repertoire">
      <span class="tab-icon">🎵</span>
      <span class="tab-label">曲库</span>
    </button>
    <button class="tab-btn" data-tab="stats">
      <span class="tab-icon">📊</span>
      <span class="tab-label">统计</span>
    </button>
  </div>
</div>

<!-- 模态框容器 -->
<div id="modalContainer"></div>

<!-- 数据层 + 管理层（基础依赖） -->
<script src="js/data.js"></script>
<script src="js/managers.js"></script>

<!-- 今日练琴模块（5 个子文件，必须按此顺序） -->
<script src="js/today/state.js"></script>
<script src="js/today/render.js"></script>
<script src="js/today/timer.js"></script>
<script src="js/today/review-free.js"></script>
<script src="js/today/submit.js"></script>

<!-- 课程 + 日历 -->
<script src="js/lessons.js"></script>
<script src="js/calendar.js"></script>

<!-- 曲库模块（3 个子文件，必须按此顺序） -->
<script src="js/repertoire/browser.js"></script>
<script src="js/repertoire/editor.js"></script>
<script src="js/repertoire/sync.js"></script>

<!-- 统计 + 应用入口 -->
<script src="js/stats.js"></script>
<script src="js/app.js"></script>
</body>
</html>
