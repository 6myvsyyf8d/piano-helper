<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="哆哩钢琴助手">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>🎹 哆哩的钢琴助手</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A1D35;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.05);
  --primary:#F5A098;
  --primary-soft:rgba(245,160,152,.15);
  --green:#8ED4A6;
  --green-soft:rgba(142,212,166,.15);
  --mint:#9BD9CE;
  --mint-soft:rgba(155,217,206,.12);
  --lavender:#BAB8E0;
  --lavender-soft:rgba(186,184,224,.1);
  --yellow:#F5D89A;
  --yellow-soft:rgba(245,216,154,.12);
  --red:#E8A0A0;
  --text:#E8E8EE;
  --text2:#A0A0B0;
  --text3:#787888;
  --border:rgba(255,255,255,.12);
  --radius:22px;
  --radius-sm:14px;
  --shadow:0 1px 2px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.3);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(170deg, #1A1D35 0%, #1F2545 25%, #1C2845 50%, #1E2340 75%, #1A1D35 100%);
  background-attachment:fixed;
  color:var(--text); line-height:1.5;
  min-height:100vh;min-height:100dvh; display:flex; justify-content:center;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
}
/* Starfield */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 20% 45%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 35% 20%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 65% 30%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 85% 15%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 55% 85%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 5% 35%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 80% 90%, rgba(255,255,255,.6), transparent),
    radial-gradient(2px 2px at 25% 75%, rgba(180,200,255,.7), transparent),
    radial-gradient(2px 2px at 60% 12%, rgba(200,180,255,.6), transparent),
    radial-gradient(2px 2px at 45% 50%, rgba(180,220,255,.5), transparent);
}
/* Blue nebula glow */
body::after{
  content:'';position:fixed;pointer-events:none;z-index:0;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle, rgba(80,120,220,.15), transparent 70%);
  top:20%;left:-10%;filter:blur(40px);
}
.app{width:100%;max-width:100%;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1}
@media (min-width:600px){
  .app{padding:0 max(16px, 3vw)}
}
@media (min-width:900px){
  .app{max-width:1200px;padding:0 32px;margin:0 auto}
}

/* ===== Header ===== */
.header{
  background:rgba(10,14,39,.6); color:var(--text);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:14px 16px 12px;text-align:center;position:relative;
  border-bottom:1px solid var(--border);
}
.logo-area{
  width:56px;height:56px;border-radius:50%;margin:0 auto 8px;
  background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);
  cursor:pointer;overflow:hidden;display:flex;align-items:center;
  justify-content:center;transition:all .2s;position:relative;
}
.logo-area:active{transform:scale(.92);background:rgba(255,255,255,.2)}
.logo-area img{width:100%;height:100%;object-fit:contain}
.logo-area #logoPlaceholder{font-size:1.6rem;opacity:.7}
.header h1{font-size:1.1rem;font-weight:700;letter-spacing:.02em;color:#fff}
.streak-badge{
  position:absolute;top:12px;right:12px;
  background:var(--primary-soft);color:var(--primary);
  border-radius:20px;padding:4px 12px;font-size:.78rem;font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.sync-btn{
  position:absolute;top:10px;right:68px;
  height:34px;border-radius:17px;border:none;
  background:var(--primary-soft);color:var(--primary);
  font-size:.78rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .2s;padding:0 12px;
}
.sync-btn:active{transform:scale(.95)}
.sync-btn.logged-in{background:var(--green-soft);color:var(--green)}

/* ===== Tabs — bottom on mobile ===== */
.tab-bar{
  display:flex;padding:8px 16px;gap:8px;
  background:rgba(10,14,39,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  order:10;
  position:sticky;bottom:0;z-index:10;
  padding-bottom:max(8px, env(safe-area-inset-bottom));
}
.tab-btn{
  flex:1;padding:12px 8px;border:none;border-radius:14px;
  font-size:clamp(.8rem, 1.8vw, .9rem);font-weight:600;
  cursor:pointer;transition:all .2s;
  background:transparent;color:var(--text2);text-align:center;
  min-height:44px;display:flex;align-items:center;justify-content:center;gap:4px;
}
.tab-btn.active{background:var(--primary-soft);color:var(--primary)}
.tab-btn:active{transform:scale(.97)}

/* ===== Main Content ===== */
.main{
  flex:1;overflow-y:auto;padding:12px 12px 16px;
  -webkit-overflow-scrolling:touch;order:5;
}
.page{display:none}
.page.active{display:block}

/* ===== Cards ===== */
.card{
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow);margin-bottom:10px;
  border:1px solid var(--border);
}
.card h3{font-size:.95rem;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-weight:700}

/* ===== Practice Status & Big Button ===== */
.practice-status{text-align:center;padding:24px 20px}
.practice-status .big-icon{font-size:3.5rem;margin-bottom:8px}
.practice-status .status-text{font-size:1rem;font-weight:600;color:var(--text2)}

.btn-big{
  display:block;width:100%;max-width:320px;margin:20px auto 0;
  padding:16px 32px;font-size:1.1rem;font-weight:700;
  border:none;border-radius:50px;cursor:pointer;transition:all .2s;
  background:var(--primary);color:#fff;
  box-shadow:0 4px 16px rgba(255,140,90,.3);
}
.btn-big:active{transform:scale(.97);box-shadow:0 2px 8px rgba(255,140,90,.2)}

/* ===== Timer ===== */
.timer-display{
  font-size:2.5rem;font-weight:700;text-align:center;
  font-variant-numeric:tabular-nums;color:var(--primary);margin:8px 0;
}
.timer-controls{display:flex;gap:10px;justify-content:center;margin-top:8px}
.btn-timer{
  padding:10px 22px;border:none;border-radius:50px;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.btn-timer.start{background:var(--green);color:#fff}
.btn-timer.pause{background:var(--primary-soft);color:var(--primary)}
.btn-timer.reset{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-timer:active{transform:scale(.95)}

/* ===== Mood Picker ===== */
.mood-picker{display:flex;gap:10px;margin-top:8px;justify-content:center}
.mood-btn{font-size:2.2rem;cursor:pointer;background:none;border:2px solid transparent;border-radius:14px;padding:6px 10px;transition:all .2s}
.mood-btn.selected{border-color:var(--primary);background:var(--primary-soft);transform:scale(1.08)}
.mood-btn:active{transform:scale(.9)}

/* ===== Sticker Picker ===== */
.sticker-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;justify-content:center}
.sticker-option{font-size:2.2rem;cursor:pointer;background:none;border:2px solid transparent;border-radius:14px;padding:6px 10px;transition:all .2s}
.sticker-option.selected{border-color:var(--primary);background:var(--primary-soft);transform:scale(1.12)}
.sticker-option:active{transform:scale(.9)}

/* ===== Buttons ===== */
.btn{
  padding:10px 20px;border:none;border-radius:50px;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn:active{transform:scale(.97)}

/* ===== Forms ===== */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;color:var(--text2)}
.form-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:.92rem;font-family:inherit;background:rgba(255,255,255,.06);color:var(--text);
  transition:border-color .2s;
}
.form-input:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,.1)}
textarea.form-input{resize:vertical;min-height:60px}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{
  padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;
  background:rgba(255,255,255,.06);color:var(--text2);cursor:pointer;transition:all .2s;
  border:1.5px solid var(--border);
}
.tag.selected{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}

.dynamic-list{margin-top:8px}
.dynamic-item{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.dynamic-item input{flex:1}
.btn-icon{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .2s;
}
.btn-icon.del{background:#FFEBEE;color:var(--red)}
.btn-icon.add{background:var(--green-soft);color:var(--green)}

/* ===== Lesson List ===== */
.lesson-card{
  background:rgba(255,255,255,.1);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border);
  border-left:4px solid var(--primary);cursor:pointer;transition:all .2s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.lesson-card:active{transform:scale(.98)}
.lesson-card .lesson-date{font-size:.78rem;color:var(--text3)}
.lesson-card .lesson-pieces{font-size:.84rem;margin-top:6px;color:var(--text);font-weight:500}
.lesson-card .lesson-focus{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.lesson-card .lesson-notes{font-size:.8rem;color:var(--text2);margin-top:6px;line-height:1.45}

/* ===== Calendar ===== */
.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calendar-nav .month-label{font-size:1.05rem;font-weight:700}
.calendar-nav button{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:6px 14px;color:var(--text2)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:3px}
.calendar-grid .day-header{font-size:.72rem;font-weight:600;color:var(--text3);padding:8px 0}
.calendar-grid .day-cell{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:var(--radius-sm);cursor:pointer;
  font-size:.84rem;transition:all .15s;position:relative;font-weight:500;
  border:1px solid var(--border);
}
.calendar-grid .day-cell.today{background:var(--primary-soft);font-weight:700;color:var(--primary);border-color:var(--primary)}
.calendar-grid .day-cell.other-month{color:var(--text3)}
.calendar-grid .day-cell:active{transform:scale(.92)}
.day-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;background:var(--green)}
.day-dot.missed{background:var(--border)}

.calendar-stats{display:flex;gap:12px;margin-top:16px}
.stat-item{
  flex:1;background:rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:14px 8px;
  box-shadow:var(--shadow);border:1px solid var(--border);text-align:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.stat-item .stat-num{font-size:1.5rem;font-weight:800;color:var(--primary)}
.stat-item .stat-label{font-size:.72rem;color:var(--text2);margin-top:2px}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s;
  padding:8px;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:rgba(20,25,52,.98);border-radius:var(--radius);padding:24px 20px 32px;
  width:100%;max-width:100%;height:96dvh;overflow-y:auto;
  animation:scaleIn .25s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h2{font-size:1.25rem;font-weight:700}
.modal .form-input{font-size:.95rem;padding:14px 16px}
.modal .btn-big{padding:18px;font-size:1.15rem}

/* ===== Day Detail ===== */
.day-detail-section{margin-bottom:14px}
.day-detail-section h4{font-size:.82rem;color:var(--text2);margin-bottom:4px}

/* ===== Animations ===== */
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .4s ease-out}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:10px}
.empty-state p{font-size:.88rem;line-height:1.5}

#pieceList{display:flex;flex-direction:column;gap:0}

/* ===== Compact Piece Cards ===== */
.piece-card{
  background:var(--card);border-radius:var(--radius);
  padding:14px 16px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  transition:all .25s;position:relative;cursor:pointer;
  display:flex;flex-direction:column;
  user-select:none;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
/* Macaron alternating card tints on dark */
.piece-card:nth-child(7n+1){background:rgba(255,255,255,.12)}
.piece-card:nth-child(7n+2){background:rgba(180,220,210,.16)}
.piece-card:nth-child(7n+3){background:rgba(255,255,255,.10)}
.piece-card:nth-child(7n+4){background:rgba(190,185,225,.16)}
.piece-card:nth-child(7n+5){background:rgba(255,255,255,.11)}
.piece-card:nth-child(7n+6){background:rgba(245,215,155,.16)}
.piece-card:nth-child(7n+7){background:rgba(180,220,210,.14)}
.piece-card:active{transform:scale(.98)}
.piece-card.done{
  background:var(--green-soft)!important;border-color:rgba(142,212,166,.3);
}
.piece-card .card-top{
  display:flex;align-items:flex-start;gap:12px;
}
.piece-card .piece-number{
  display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;
  width:30px;height:30px;border-radius:8px;
  background:var(--primary-soft);color:var(--primary);
  font-weight:700;font-size:.85rem;
}
.piece-card .card-main{flex:1;min-width:0}
.piece-card .piece-title{
  font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.3;
}
.piece-card .expand-hint{
  font-size:.72rem;color:var(--text3);margin-top:2px;
  display:flex;align-items:center;gap:4px;
}
.piece-card .expand-hint::after{
  content:'›';display:inline-block;transition:transform .25s;
  font-size:1rem;font-weight:700;
}
.piece-card.expanded .expand-hint::after{
  transform:rotate(90deg);
}
/* Teacher notes — collapsed by default */
.teacher-bubble{
  background:rgba(255,255,255,.04);border-radius:12px;
  padding:12px 14px;margin-top:12px;
  font-size:.85rem;line-height:1.5;
  color:var(--text2);border:1px solid var(--border);
  max-height:0;overflow:hidden;padding-top:0;padding-bottom:0;
  margin-top:0;border-width:0;
  opacity:0;transition:all .3s ease;
}
.piece-card.expanded .teacher-bubble{
  max-height:600px;overflow-y:auto;
  padding:12px 14px;margin-top:12px;
  border-width:1px;opacity:1;
}
.teacher-bubble .bubble-label{
  font-size:.7rem;font-weight:700;color:var(--primary);
  margin-bottom:4px;letter-spacing:.04em;
}
/* Stars */
.star-big-row{
  display:flex;gap:4px;margin:10px 0 0;justify-content:flex-start;
}
.star-big{
  font-size:1.8rem;cursor:pointer;transition:all .15s;
  background:none;border:none;padding:2px;line-height:1;
  -webkit-tap-highlight-color:transparent;
  filter:grayscale(1) opacity(.3);
  min-width:36px;min-height:36px;
}
.star-big.active{filter:none;transform:scale(1.1)}
.star-big:active{transform:scale(1.2)}
/* Done button */
.done-btn{
  display:flex;align-items:center;justify-content:center;gap:4px;
  width:100%;padding:10px;border:none;border-radius:10px;
  font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.08);color:var(--text2);margin-top:10px;
  min-height:40px;
}
.done-btn.checked{background:var(--green-soft);color:var(--green)}
.done-btn:active{transform:scale(.97)}

/* ===== Parent Panel ===== */
.parent-panel{margin-top:18px}
.parent-toggle{
  display:block;width:100%;padding:12px;border:1.5px dashed var(--border);
  border-radius:var(--radius-sm);font-size:.82rem;color:var(--text3);
  cursor:pointer;background:transparent;text-align:center;transition:all .2s;
}
.parent-toggle:active{background:rgba(255,255,255,.05)}
.parent-content{display:none;padding:18px;background:rgba(255,255,255,.04);border-radius:var(--radius);margin-top:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.parent-content.open{display:block}
.parent-content .parent-section{margin-bottom:14px}
.parent-content .parent-section h4{font-size:.8rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.parent-piece-row{
  display:flex;align-items:center;gap:10px;padding:6px 0;
  font-size:.84rem;font-weight:500;
}
.parent-piece-row span{min-width:80px}
.parent-piece-row input{width:70px}

/* ===== Celebration ===== */
.celebration{
  text-align:center;padding:clamp(20px, 4vh, 32px) 20px;animation:popIn .5s ease-out;
}
.celebration .celeb-icon{font-size:clamp(3.5rem, 8vw, 5rem);animation:bounce .6s ease-in-out}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}50%{transform:translateY(0)}70%{transform:translateY(-8px)}}
.celebration h2{font-size:clamp(1.2rem, 2.5vw, 1.5rem);color:var(--green);margin:12px 0 4px;font-weight:700}
.celebration .celeb-stats{font-size:clamp(.85rem, 1.6vw, .95rem);color:var(--text2);margin-bottom:10px}
.done-piece-row{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px;
  font-size:clamp(.85rem, 1.6vw, .95rem);
}
.done-piece-row .dp-stars{font-size:1.1em;margin-left:auto}

/* ===== Repertoire ===== */
.rep-book-section{margin-bottom:16px}
.rep-book-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-radius:var(--radius);border:1px solid var(--border);
  background:rgba(255,255,255,.06);cursor:pointer;transition:all .2s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.rep-book-header:active{background:rgba(255,255,255,.1)}
.rep-book-header .book-title{flex:1;font-size:.9rem;font-weight:700}
.rep-book-header .book-progress{
  font-size:.78rem;font-weight:600;color:var(--primary);
  display:flex;align-items:center;gap:6px;
}
.rep-book-header .book-arrow{
  font-size:1rem;color:var(--text3);transition:transform .25s;
}
.rep-book-header.open .book-arrow{transform:rotate(90deg)}
.rep-progress-bar{

<script>
// ==================== DATA LAYER ====================
const DB = {
  get(key, fallback = []) {
    try { const v = localStorage.getItem('piano_' + key); return v ? JSON.parse(v) : fallback }
    catch { return fallback }
  },
  set(key, val) { localStorage.setItem('piano_' + key, JSON.stringify(val)) },
  lessons() { return this.get('lessons') },
  saveLessons(v) { this.set('lessons', v) },
  logs() { return this.get('logs') },
  saveLogs(v) { this.set('logs', v) },

function initRepertoire() {
  const REP_VERSION = 2; // bump to force re-init
  const storedVer = localStorage.getItem('piano_rep_version');
  if (!localStorage.getItem('piano_repertoire') || storedVer != REP_VERSION) {
    const rep = SUZUKI_DATA.map(p => ({
      ...p,
      status: p.book === 1 ? 'learned' : (p.book === 2 && p.num <= 4 ? 'learned' : 'untouched'),
      memorized: p.book === 1 ? true : (p.book === 2 && p.num <= 4 ? true : false),
      startedDate: null,
      completedDate: p.book === 1 ? '2026-01-01' : (p.book === 2 && p.num <= 4 ? '2026-03-01' : null),
      totalMin: 0,
    }));
    localStorage.setItem('piano_repertoire', JSON.stringify(rep));
    localStorage.setItem('piano_rep_version', REP_VERSION);
  }
}

function getRepertoire() {
  try { return JSON.parse(localStorage.getItem('piano_repertoire')) || []; }
  catch { return []; }
}

function saveRepertoire(rep) {
  localStorage.setItem('piano_repertoire', JSON.stringify(rep));
}

function getRandomReview(count, excludeNames, bookFilter) {
  const all = getRepertoire();
  const learned = all.filter(p => p.status === 'learned' && !excludeNames.includes(p.name) && (!bookFilter || p.book === bookFilter));
  const shuffled = [...learned].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

// ==================== LOGO ====================
function loadLogo() {
  const saved = localStorage.getItem('piano_logo');
  if (saved) {
    document.getElementById('logoImg').src = saved;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  }
}
window.handleLogoUpload = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      // Resize proportionally to max 200px on longest side
      const maxSide = 200;
      let w = img.width, h = img.height;
      const ratio = Math.min(maxSide / w, maxSide / h);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', .8);
      localStorage.setItem('piano_logo', compressed);
      loadLogo();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

// ==================== HELPERS ====================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function today() { return new Date().toISOString().slice(0, 10) }
function fmtDate(d) { const dt = new Date(d + 'T00:00:00'); return `${dt.getMonth()+1}月${dt.getDate()}日` }
function fmtDateShort(d) { return d.slice(5) }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6) }
function getLog(date) { return DB.logs().find(l => l.date === date) }
function latestLesson() {
  const ls = DB.lessons();
  return ls.length ? ls.sort((a,b) => b.date.localeCompare(a.date))[0] : null;
}

// Streak calculation
function calcStreak() {
  const logs = DB.logs();
  if (!logs.length) return 0;
  const dates = new Set(logs.map(l => l.date));
  let streak = 0;
  const d = new Date(today() + 'T00:00:00');
  while (dates.has(d.toISOString().slice(0, 10))) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  // Also count today if not yet logged but we're showing the streak
  return streak;
}

// ==================== RENDER ====================
function renderAll() {
  document.getElementById('streakBadge').textContent = '🔥 ' + calcStreak() + ' 天';
  updateSyncButtonState();
  renderToday();
  renderLessons();
  renderCalendar();
  renderRepertoire();
}

// ---------- Tab 1: Today ----------
function renderToday() {
  const page = document.getElementById('page-today');
  const log = getLog(today());
  const lesson = latestLesson();

  if (log) {
    // Already practiced today — show summary
    page.innerHTML = renderTodayDone(log);
  } else {
    // Not practiced yet — show practice form
    page.innerHTML = renderTodayForm(lesson);
    bindTodayForm(lesson);
  }
}

function renderTodayDone(log) {
  const totalStars = log.entries.reduce((s, e) => s + (e.rating || 0), 0);
  const totalMin = log.entries.reduce((s, e) => s + (e.durationMin || 0), 0) || log.totalDurationMin || 0;

  const piecesHtml = log.entries.map((e, i) => `
    <div class="done-piece-row">
      <span>${i+1}.</span>
      <span style="font-weight:600">${esc(e.pieceName)}</span>
      <span class="dp-stars">${'⭐'.repeat(e.rating || 0)}${e.rating ? '' : '<span style="color:#ccc">未评分</span>'}</span>
    </div>
  `).join('');

  return `
    <div class="card">
      <div class="celebration">
        <div class="celeb-icon">🎉</div>
        <h2>太棒了！</h2>
        <div class="celeb-stats">
          今天练了 <strong>${log.entries.length}</strong> 首曲目 · 共 <strong>${totalMin}</strong> 分钟 · <strong>${totalStars}</strong> ⭐
          ${log.mood ? ' · 心情 ' + log.mood : ''}
        </div>
      </div>
    </div>

    <div class="card">
      <h3>🎵 今日练习</h3>
      ${piecesHtml}
    </div>

    ${log.parentNotes ? `
    <div class="card">
      <h3>📝 家长笔记</h3>
      <p style="font-size:.9rem;line-height:1.5">${esc(log.parentNotes)}</p>
    </div>` : ''}

    <div class="mt-8">
      <button class="btn btn-secondary" onclick="editTodayLog()" style="width:100%">✏️ 修改今天记录</button>
    </div>
  `;
}

function renderTodayForm(lesson) {
  let piecesHtml = '';
  const catLabels = { suzuki: '🎻 铃木', beyer: '🎼 拜厄', pieces: '🎵 小川一郎小曲集' };
  const catOrder = ['suzuki', 'beyer', 'pieces'];

  if (lesson && lesson.pieces && lesson.pieces.length) {
    // Enrich with English names from repertoire
    const repLookup = {};
    getRepertoire().forEach(r => { repLookup[r.name] = r.en; if (r.repId) repLookup[r.id] = r.en; });
    const grouped = {};
    lesson.pieces.forEach((p, i) => {
      const cat = p.category || 'suzuki';
      if (!grouped[cat]) grouped[cat] = [];
      const en = repLookup[p.name] || repLookup[p.repId] || '';
      grouped[cat].push({ ...p, origIdx: i, en });
    });

    piecesHtml = catOrder.filter(cat => grouped[cat]).map(cat => `
      <div class="prac-cat-header" id="pracHead_${cat}" onclick="togglePracCat('${cat}')">
        <span class="cat-dot ${cat}"></span>
        <span class="cat-title">${catLabels[cat]}</span>
        <span class="cat-count">${grouped[cat].length}首</span>
        <span class="cat-arrow">▶</span>
      </div>
      <div class="prac-list" id="pracList_${cat}">
        ${grouped[cat].map(p => {
          const idx = p.origIdx;
          return `
        <div class="prac-row" data-idx="${idx}" id="pracRow${idx}">
          <span class="prac-num">${idx+1}</span>
          <span class="prac-info" data-action="expand" data-idx="${idx}">
            <span class="prac-name">${esc(p.en || p.name)} <span style="font-weight:400;color:var(--text3);font-size:.72rem">${esc(p.name)}</span></span>
          </span>
          <span class="prac-stars">
            ${[1,2,3,4,5].map(s => `<button class="prac-star" data-action="star" data-idx="${idx}" data-star="${s}">⭐</button>`).join('')}
          </span>
          <button class="prac-done" data-action="toggle" data-idx="${idx}">练完了</button>
        </div>
        ${p.details ? `<div class="prac-detail">${esc(p.details)}</div>` : ''}`;
        }).join('')}
      </div>
    `).join('');
  } else {
    piecesHtml = `
      <div class="card">
        <p class="text-center text-sm">还没有上课记录，先去「📒 上课记录」添加吧～</p>
        <div id="pieceList" style="display:none"></div>
      </div>`;
  }

// ==================== TODAY'S PRACTICE STATE ====================
let pieceStates = {};
let todayMood = '';
let timerSec = 0, timerInterval = null;

function resetPracticeState() {
  pieceStates = {};
  timerSec = 0;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function bindTodayForm(lesson) {
  resetPracticeState();

  const initPiece = (idx) => {
    pieceStates[idx] = pieceStates[idx] || {
      done: false, rating: 0, durationMin: 0, notes: '',
      pieceName: (lesson?.pieces || [])[idx]?.name || ''
    };
  };
  if (lesson && lesson.pieces) lesson.pieces.forEach((_, i) => initPiece(i));
  else initPiece(0);

  const pieceList = document.getElementById('pieceList');
  if (pieceList) {
    pieceList.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const idx = btn.dataset.idx;
      initPiece(idx);
      const action = btn.dataset.action;

      if (action === 'expand') {
        const row = document.getElementById('pracRow' + idx);
        if (row) row.classList.toggle('expanded');
        return;
      }
      if (action === 'toggle') {
        pieceStates[idx].done = !pieceStates[idx].done;
        btn.classList.toggle('checked', pieceStates[idx].done);
        btn.textContent = pieceStates[idx].done ? '已练' : '练完了';
        const row = btn.closest('.prac-row');
        if (row) row.classList.toggle('done', pieceStates[idx].done);
      }
      if (action === 'star') {
        const star = parseInt(btn.dataset.star);
        pieceStates[idx].rating = pieceStates[idx].rating === star ? 0 : star;
        const stars = pieceList.querySelectorAll(`[data-action="star"][data-idx="${idx}"]`);
        stars.forEach(s => {
          const v = parseInt(s.dataset.star);
          s.classList.toggle('active', v <= pieceStates[idx].rating);
        });
      }
    });
    pieceList.addEventListener('input', e => {
      const el = e.target;
      if (!el.dataset.action) return;
      const idx = el.dataset.idx;
      initPiece(idx);
      if (el.dataset.action === 'duration') pieceStates[idx].durationMin = parseInt(el.value) || 0;
      if (el.dataset.action === 'note') pieceStates[idx].notes = el.value;
      if (el.dataset.action === 'pieceName') pieceStates[idx].pieceName = el.value;
    });
  }

  // Timer — uses module-level timerSec, timerInterval
  const timerDisplay = document.getElementById('timerDisplay');
  function updateTimerDisplay() {
    const m = Math.floor(timerSec / 60), s = timerSec % 60;
    if (timerDisplay) timerDisplay.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  document.getElementById('timerStart')?.addEventListener('click', () => {
    if (timerInterval) return;
    timerInterval = setInterval(() => { timerSec++; updateTimerDisplay() }, 1000);
  });
  document.getElementById('timerPause')?.addEventListener('click', () => {
    clearInterval(timerInterval); timerInterval = null;
  });
  document.getElementById('timerReset')?.addEventListener('click', () => {
    clearInterval(timerInterval); timerInterval = null; timerSec = 0; updateTimerDisplay();
  });

  // Mood — uses module-level todayMood
  document.getElementById('moodPicker')?.addEventListener('click', e => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    document.querySelectorAll('#moodPicker .mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    todayMood = btn.dataset.mood;
  });

  // Random review — only from Book 1, with memorized toggle
  if (lesson) {
    const lessonNames = (lesson.pieces || []).map(p => p.name);
    const reviews = getRandomReview(4, lessonNames, 1); // Book 1 only
    const reviewCards = document.getElementById('reviewCards');
    if (reviewCards && reviews.length) {
      reviewCards.innerHTML = reviews.map((r, ri) => {
        const idx = 'r' + ri;
        const memLabel = r.memorized ? '🧠 背谱' : '📖 看谱';
        return `
        <div class="prac-row" data-idx="${idx}">
          <span class="prac-num">${ri+1}</span>
          <span class="prac-info">
            <span class="prac-name">${esc(r.en||r.name)} <span style="font-weight:400;color:var(--text3);font-size:.72rem">${esc(r.name)}</span></span>
          </span>
          <span class="prac-stars">
            ${[1,2,3,4,5].map(s => `<button class="prac-star" data-action="star" data-idx="${idx}" data-star="${s}">⭐</button>`).join('')}
          </span>
          <button class="prac-mem-btn" data-action="reviewMem" data-idx="${idx}" data-repid="${r.id}" style="font-size:.7rem;padding:4px 8px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer">${memLabel}</button>
          <button class="prac-done" data-action="review" data-idx="${idx}" data-name="${esc(r.name)}">已复习</button>
        </div>`;
      }).join('');
      reviews.forEach((r, ri) => {
        pieceStates['r' + ri] = { done: false, rating: 0, durationMin: 0, notes: '', pieceName: (r.en||r.name) + '（复习）', repId: r.id, reviewMem: r.memorized };
      });
      // Add duration inputs for review pieces in parent panel
      const parentContent = document.getElementById('parentContent');
      if (parentContent && reviews.length) {
        const reviewDurSection = document.createElement('div');
        reviewDurSection.className = 'parent-section';
        reviewDurSection.id = 'reviewDurSection';
        reviewDurSection.innerHTML = `
          <h4>⏱ 复习曲目分钟</h4>
          ${reviews.map((r, ri) => `
            <div class="parent-piece-row">
              <span>${esc(r.name)}</span>
              <input class="form-input" type="number" placeholder="分钟" min="0" max="180" data-action="duration" data-idx="r${ri}" style="width:60px;padding:6px 8px;font-size:.8rem">
            </div>
          `).join('')}
        `;
        // Insert before the parent notes section (last child)
        const notesSection = parentContent.querySelector('.parent-section:last-of-type');
        if (notesSection && notesSection.querySelector('textarea')) {
          parentContent.insertBefore(reviewDurSection, notesSection);
        } else {
          parentContent.appendChild(reviewDurSection);
        }
      }
      reviewCards.addEventListener('click', e => {
        // Handle memorized toggle
        const memBtn = e.target.closest('[data-action="reviewMem"]');
        if (memBtn) {
          const idx = memBtn.dataset.idx;
          const repId = memBtn.dataset.repid;
          if (!pieceStates[idx]) return;
          pieceStates[idx].reviewMem = !pieceStates[idx].reviewMem;
          memBtn.textContent = pieceStates[idx].reviewMem ? '🧠 背谱' : '📖 看谱';
          // Sync to repertoire
          const rep = getRepertoire();
          const rp = rep.find(r => r.id === repId);
          if (rp) { rp.memorized = pieceStates[idx].reviewMem; saveRepertoire(rep); }
          return;
        }
        // Handle review toggle
        const btn = e.target.closest('[data-action="review"]');
        if (!btn) return;
        const idx = btn.dataset.idx;
        if (!pieceStates[idx]) {
          pieceStates[idx] = { done: false, rating: 0, durationMin: 0, notes: '', pieceName: (btn.dataset.name || '') + '（复习）' };
        }
        pieceStates[idx].done = !pieceStates[idx].done;
        btn.classList.toggle('checked', pieceStates[idx].done);
        btn.textContent = pieceStates[idx].done ? '已复习' : '已复习';
        const row = btn.closest('.prac-row');
        if (row) row.classList.toggle('done', pieceStates[idx].done);
      });
    }
  }

  // Save
  document.getElementById('btnSavePractice')?.addEventListener('click', () => {
    const totalMin = Math.floor(timerSec / 60);
    const entries = Object.entries(pieceStates).map(([idx, s]) => {
      // Determine category: lesson piece → from lesson data; review → 'review'; fallback → 'pieces'
      let category = 'pieces';
      if (/^r\d+$/.test(idx)) {
        category = 'review';
      } else {
        const pieceIdx = parseInt(idx);
        if (!isNaN(pieceIdx) && lesson?.pieces?.[pieceIdx]) {
          category = lesson.pieces[pieceIdx].category || 'pieces';
        }
      }
      return {
        pieceName: s.pieceName || `曲目 ${parseInt(idx)+1}`,
        detail: (lesson?.pieces || [])[idx]?.details || '',
        durationMin: s.durationMin || 0,
        notes: s.notes || '',
        rating: s.rating || 0,
        done: s.done,
        category
      };
    }).filter(e => e.done || e.durationMin > 0 || e.rating > 0);

    if (entries.length === 0 && totalMin === 0) {
      alert('请至少完成一项练习再保存哦～');
      return;
    }

    const log = {
      id: uid(),
      date: today(),
      entries,
      totalDurationMin: entries.reduce((s, e) => s + e.durationMin, 0) || totalMin,
      parentNotes: document.getElementById('parentNotes')?.value || '',
    };

    // Remove existing today log if any
    const logs = DB.logs().filter(l => l.date !== today());
    logs.push(log);
    DB.saveLogs(logs);
    resetPracticeState();
    renderAll();
    autoSyncAfterSave(); // Auto sync to server (fire-and-forget)
  });
}

window.setLessonStar = function(btn, cat, pi, star) {
  const group = document.querySelector('.lesson-cat-group[data-cat="' + cat + '"]');
  const btns = group.querySelectorAll('.star-score-row')[pi]?.querySelectorAll('.star-score-btn');
  if (!btns) return;
  const allLit = [...btns].every(b => parseInt(b.dataset.star) === star && b.style.filter.includes('0'));
  const newScore = allLit ? star - 1 : star;
  btns.forEach(b => {
    const v = parseInt(b.dataset.star);
    b.style.filter = 'grayscale(' + (v <= newScore ? '0' : '1') + ')';
    b.style.opacity = v <= newScore ? '1' : '.25';
  });
  // Store score in a hidden field
  let hiddenScore = group.querySelector('[data-field="score"][data-pi="' + pi + '"]');
  if (!hiddenScore) {
    hiddenScore = document.createElement('input');
    hiddenScore.type = 'hidden';
    hiddenScore.dataset.field = 'score';
    hiddenScore.dataset.pi = pi;
    const card = btn.closest('.lesson-piece-card');
    card.appendChild(hiddenScore);
  }
  hiddenScore.value = newScore > 0 ? '⭐'.repeat(newScore) : '';
};

window.saveLesson = function(editId) {
  const date = document.getElementById('lessonDate').value;
  const notes = document.getElementById('lessonNotes').value.trim();
  const nextLessonDate = document.getElementById('nextLessonDate').value;

  // Collect pieces with their category
  const pieces = [];
  document.querySelectorAll('.lesson-cat-group').forEach(group => {
    const cat = group.dataset.cat;
    group.querySelectorAll('.lesson-piece-card').forEach(card => {
      const nameEl = card.querySelector('[data-field="name"]');
      const name = nameEl.value.trim();
      const details = card.querySelector('[data-field="details"]').value.trim();
      const scoreEl = card.querySelector('[data-field="score"]');
      const score = scoreEl ? scoreEl.value : '';
      // For Suzuki dropdowns, also get repId
      let repId = '';
      if (nameEl.tagName === 'SELECT') {
        const opt = nameEl.options[nameEl.selectedIndex];
        if (opt) repId = opt.dataset.repid || '';
      }
      if (name) pieces.push({ name, details, category: cat, score, repId });
    });
  });

  // Collect focus areas
  const focusAreas = [];
  document.querySelectorAll('#focusTags .tag.selected').forEach(t => focusAreas.push(t.dataset.tag));
  const custom = document.getElementById('customFocus').value.trim();
  if (custom) focusAreas.push(custom);

  if (!date) { alert('请选择日期'); return; }
  if (!pieces.length) { alert('请至少添加一个曲目'); return; }

  const lesson = {
    id: editId || uid(),
    date, pieces, focusAreas, notes, nextLessonDate,
  };

  let lessons = DB.lessons();
  if (editId) lessons = lessons.map(l => l.id === editId ? lesson : l);
  else lessons.push(lesson);
  DB.saveLessons(lessons);
  closeModal();
  renderAll();
  autoSyncAfterSave(); // Auto sync to server (fire-and-forget)
};

function renderCalendar() {
  const page = document.getElementById('page-calendar');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth(); // 0-indexed
  page._calYear = year;
  page._calMonth = month;
  page.innerHTML = buildCalendarHTML(year, month);
  bindCalendarClicks(page, year, month);
}

function buildCalendarHTML(year, month) {
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const todayStr = today();
  const logsMap = {};
  DB.logs().forEach(l => { logsMap[l.date] = l });

  // Monthly stats
  let monthDays = 0, monthMinutes = 0;
  DB.logs().forEach(l => {
    const d = new Date(l.date + 'T00:00:00');
    if (d.getFullYear() === year && d.getMonth() === month) {
      monthDays++;
      monthMinutes += l.totalDurationMin || 0;
    }
  });

  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayHeaders = ['日','一','二','三','四','五','六'];

  let cells = '';
  // Prev month padding — compute correct prev month (1-indexed) and year
  const prevY = month === 0 ? year - 1 : year;
  const prevM = month === 0 ? 12 : month; // 1-indexed
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    const ds = `${prevY}-${String(prevM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells += `<div class="day-cell other-month" data-date="${ds}">${d}</div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const log = logsMap[ds];
    const cls = ['day-cell'];
    if (isToday) cls.push('today');
    const dot = log ? '<div class="day-dot"></div>' : (ds < todayStr ? '<div class="day-dot missed"></div>' : '');
    cells += `<div class="${cls.join(' ')}" data-date="${ds}">${d}${dot}</div>`;
  }
  // Next month padding — compute correct next month (1-indexed) and year
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  const nextY = month === 11 ? year + 1 : year;
  const nextM = month === 11 ? 1 : month + 2; // 1-indexed
  for (let d = 1; d <= remaining; d++) {
    const ds = `${nextY}-${String(nextM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells += `<div class="day-cell other-month" data-date="${ds}">${d}</div>`;
  }

  return `
    <div class="calendar-nav">
      <button onclick="navCalendar(-1)">◀</button>
      <span class="month-label">📅 ${year}年 ${months[month]}</span>
      <button onclick="navCalendar(1)">▶</button>
    </div>
    <div class="calendar-grid">
      ${dayHeaders.map(h => `<div class="day-header">${h}</div>`).join('')}
      ${cells}
    </div>
    <div class="calendar-stats">
      <div class="stat-item">
        <div class="stat-num">${monthDays}</div>
        <div class="stat-label">本月练习天数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">${Math.round(monthMinutes / 60 * 10) / 10 || 0}</div>
        <div class="stat-label">本月练习小时</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">${calcStreak()}</div>
        <div class="stat-label">连续练习天</div>
      </div>
    </div>
  `;
}

function bindCalendarClicks(page, year, month) {
  page.querySelectorAll('.day-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const date = cell.dataset.date;
      const log = getLog(date);
      showDayDetail(date, log);
    });
  });
}

window.navCalendar = function(delta) {
  const page = document.getElementById('page-calendar');
  let y = page._calYear || new Date().getFullYear();
  let m = (page._calMonth || new Date().getMonth()) + delta;
  if (m < 0) { m = 11; y-- }
  if (m > 11) { m = 0; y++ }
  page._calYear = y;
  page._calMonth = m;
  page.innerHTML = buildCalendarHTML(y, m);
  bindCalendarClicks(page, y, m);
};

window.toggleRepCard = function(id) {
  _repState.cards[id] = !_repState.cards[id];
  const card = document.getElementById('repCard' + id);

window.setRepStatus = function(id, value) {
  const rep = getRepertoire();
  const p = rep.find(r => r.id === id);
  if (!p) return;
  if (value === 'untouched') { p.status = 'untouched'; p.memorized = false; p.startedDate = null; p.completedDate = null; }
  else if (value === 'learning') { p.status = 'learning'; p.memorized = false; p.startedDate = p.startedDate || today(); p.completedDate = null; }
  else if (value === 'learned_nomem') { p.status = 'learned'; p.memorized = false; p.completedDate = p.completedDate || today(); }
  else if (value === 'learned_mem') { p.status = 'learned'; p.memorized = true; p.completedDate = p.completedDate || today(); }
  saveRepertoire(rep);
  renderRepertoire();
};

window.cycleRepStatus = function(id) {
  const rep = getRepertoire();
  const p = rep.find(r => r.id === id);
  if (!p) return;
  if (p.status === 'untouched') { p.status = 'learning'; p.startedDate = p.startedDate || today(); }
  else if (p.status === 'learning') { p.status = 'learned'; p.completedDate = today(); p.memorized = true; }
  else { p.status = 'untouched'; p.startedDate = null; p.completedDate = null; p.memorized = false; }
  saveRepertoire(rep);
  renderRepertoire();
};

window.toggleMemorized = function(id) {
  const rep = getRepertoire();
  const p = rep.find(r => r.id === id);
  if (!p) return;
  if (p.status !== 'learned') { cycleRepStatus(id); return; }
  p.memorized = !p.memorized;
  saveRepertoire(rep);
  renderRepertoire();
};

function showDayDetail(date, log) {
  const modal = document.getElementById('modalContainer');
  if (!log) {
    modal.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-header">
            <h2>📅 ${fmtDate(date)}</h2>
            <button class="btn-icon del" onclick="closeModal()" style="border-radius:50%">✕</button>
          </div>
          <div class="empty-state">
            <div class="empty-icon">😴</div>
            <p>这天没有练琴记录</p>
          </div>
        </div>
      </div>`;
    return;
  }

  const catLabels = { suzuki: '🎻 铃木', beyer: '🎼 拜厄', pieces: '🎵 小川一郎小曲集', review: '🎲 复习' };
  const catOrder = ['suzuki', 'beyer', 'pieces', 'review'];

  // Build a piece-name → category lookup from the lesson on this date
  const lesson = DB.lessons().find(l => l.date === date);
  const catLookup = {};
  if (lesson && lesson.pieces) {
    lesson.pieces.forEach(p => { catLookup[p.name] = p.category || 'pieces'; });
  }

  // Group entries by category
  const grouped = {};
  log.entries.forEach(e => {
    let cat = e.category;
    // Fallback for old data: try lesson lookup, then check if name contains "复习"
    if (!cat) {
      if (e.pieceName && e.pieceName.includes('（复习）')) {
        cat = 'review';
      } else {
        // Try to match by piece name against the lesson data
        cat = 'pieces';
        for (const [name, c] of Object.entries(catLookup)) {
          if (e.pieceName && e.pieceName.includes(name)) { cat = c; break; }
        }
      }
    }
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(e);
  });

  // Calculate totals
  const totalStars = log.entries.reduce((s, e) => s + (e.rating || 0), 0);
  const totalMin = log.entries.reduce((s, e) => s + (e.durationMin || 0), 0) || log.totalDurationMin || 0;

  // Best & worst (based on star rating, only consider rated pieces)
  const rated = log.entries.filter(e => e.rating > 0);
  const best = rated.length ? rated.reduce((a, b) => (a.rating || 0) >= (b.rating || 0) ? a : b) : null;
  const worst = rated.length > 1 ? rated.reduce((a, b) => (a.rating || 0) <= (b.rating || 0) ? a : b) : null;
  const showWorst = worst && best && (worst.rating || 0) < (best.rating || 0);

  // Highlight section
  let highlightHtml = '';
  if (best) {
    highlightHtml += `
      <div class="day-detail-section">
        <h4>🌟 弹得最好</h4>
        <div class="piece-item" style="border-left:3px solid var(--green)">
          <div class="piece-info">
            <div class="piece-name">${esc(best.pieceName)}</div>
            <div class="text-sm">${'⭐'.repeat(best.rating || 0)} · ⏱ ${best.durationMin || 0} 分钟</div>
          </div>
        </div>
      </div>`;
  }
  if (showWorst) {
    highlightHtml += `
      <div class="day-detail-section">
        <h4>💪 需要加油</h4>
        <div class="piece-item" style="border-left:3px solid var(--primary)">
          <div class="piece-info">
            <div class="piece-name">${esc(worst.pieceName)}</div>
            <div class="text-sm">${'⭐'.repeat(worst.rating || 0)} · ⏱ ${worst.durationMin || 0} 分钟</div>
          </div>
        </div>
      </div>`;
  }

  // Category breakdown
  const catHtml = catOrder.filter(cat => grouped[cat]).map(cat => {
    const entries = grouped[cat];
    const catMin = entries.reduce((s, e) => s + (e.durationMin || 0), 0);
    const catStars = entries.reduce((s, e) => s + (e.rating || 0), 0);
    const piecesHtml = entries.map(e => `
      <div class="piece-item">
        <div class="piece-info">
          <div class="piece-name">${esc(e.pieceName)}</div>
          <div class="text-sm">⏱ ${e.durationMin || 0} 分钟 · ${'⭐'.repeat(e.rating || 0)}${!e.rating ? ' <span style="color:var(--text3)">未评分</span>' : ''}</div>
          ${e.notes ? `<div class="text-sm">📝 ${esc(e.notes)}</div>` : ''}
        </div>
      </div>
    `).join('');
    return `
      <div class="day-detail-section" style="margin-bottom:16px">
        <h4 style="font-size:.85rem">${catLabels[cat]} <span style="font-weight:400;color:var(--text2);font-size:.75rem">— ${catMin}分钟 · ${catStars}⭐</span></h4>
        ${piecesHtml}
      </div>`;
  }).join('');

  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>📅 ${fmtDate(date)}</h2>
          <button class="btn-icon del" onclick="closeModal()" style="border-radius:50%">✕</button>
        </div>

        <div class="calendar-stats">
          <div class="stat-item">
            <div class="stat-num">${totalStars}</div>
            <div class="stat-label">⭐ 获得星星</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${totalMin}</div>
            <div class="stat-label">⏱ 练琴分钟</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${log.entries.length}</div>
            <div class="stat-label">🎵 练习曲目</div>
          </div>
        </div>

        ${highlightHtml}

        <div style="margin-top:16px">
          <h4 style="font-size:.82rem;color:var(--text2);margin-bottom:8px">📊 按大类汇总</h4>
          ${catHtml}
        </div>

        ${log.parentNotes ? `
        <div class="day-detail-section" style="margin-top:16px">
          <h4>📝 家长笔记</h4>
          <p style="font-size:.9rem">${esc(log.parentNotes)}</p>
        </div>` : ''}
      </div>
    </div>`;
}

// ==================== CLOUD SYNC (GitHub Gist) ====================
const GIST_ID = '6441ba40b32a4f439bef121319a8c459';
const SYNC_KEY = 'piano_cloud';

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || { token:'', lastSync:null }; }
  catch { return { token:'', lastSync:null }; }
}
function saveSyncConfig(c) { localStorage.setItem(SYNC_KEY, JSON.stringify(c)); }

async function cloudUpload() {
  const cfg = getSyncConfig();
  if (!cfg.token) return false;
  try {
    const data = { lessons: DB.lessons(), logs: DB.logs(), _ts: new Date().toISOString() };
    const res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      method: 'PATCH',
      headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'piano-data.json': { content: JSON.stringify(data) } } }),
      signal: AbortSignal.timeout(8000),
    });
    if (res.ok) {
      cfg.lastSync = new Date().toISOString();
      saveSyncConfig(cfg);
      updateSyncButtonState();
      return true;
    }
  } catch(e) {}
  return false;
}

async function cloudDownload() {
  const cfg = getSyncConfig();
  if (!cfg.token) return null;
  try {
    const res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      headers: { 'Authorization': 'token ' + cfg.token },
      signal: AbortSignal.timeout(8000),
    });
    if (!res.ok) return null;
    const gist = await res.json();
    const raw = gist.files['piano-data.json']?.content;
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Merge: union by id
    const lm = new Map(); DB.lessons().forEach(l => lm.set(l.id, l));
    (data.lessons||[]).forEach(l => lm.set(l.id, l));
    const lgm = new Map(); DB.logs().forEach(l => lgm.set(l.id, l));
    (data.logs||[]).forEach(l => lgm.set(l.id, l));
    DB.saveLessons([...lm.values()]); DB.saveLogs([...lgm.values()]);
    cfg.lastSync = new Date().toISOString(); saveSyncConfig(cfg);
    renderAll(); return true;
  } catch(e) { return null; }
}

function autoSync() {
  const cfg = getSyncConfig();
  if (cfg.token) cloudUpload(); // fire and forget
}

// Update autoSyncAfterSave calls to use cloud
async function autoSyncAfterSave() {
  const cfg = getSyncConfig();
  if (cfg.token) await cloudUpload();
}

window.showSyncPanel = function() {
  const cfg = getSyncConfig();
  const modal = document.getElementById('modalContainer');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>☁️ GitHub 云端同步</h2>
          <button class="btn-icon del" onclick="closeModal()" style="border-radius:50%">✕</button>
        </div>
        <div class="form-group">
          <label>🔑 GitHub Token</label>
          <input class="form-input" type="password" id="cloudToken" placeholder="ghp_..." value="${esc(cfg.token)}">
          <p class="text-sm mt-8">在 <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--primary)">github.com/settings/tokens</a> 创建 token，勾选 gist 权限</p>
        </div>
        ${cfg.lastSync ? '<p class="text-sm mb-12">上次同步：' + new Date(cfg.lastSync).toLocaleString('zh-CN') + '</p>' : ''}
        <button class="btn btn-primary mt-12" id="btnCloudSave" style="width:100%">💾 保存并同步</button>

        <hr style="border-color:var(--border);margin:20px 0">

        <h3 style="font-size:.9rem;margin-bottom:8px">📥 从旧版导入数据</h3>
        <p class="text-sm mb-8">如果你之前用局域网同步服务器，数据在电脑上。运行以下命令复制数据：</p>
        <div style="background:rgba(0,0,0,.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:.75rem;font-family:monospace;color:var(--mint);word-break:break-all;margin-bottom:8px;user-select:all;cursor:pointer" onclick="navigator.clipboard.writeText(this.textContent);alert('已复制！粘贴到下面文本框即可')">cat ~/.piano-sync/data.json | pbcopy</div>
        <label class="text-sm">粘贴 JSON 数据：</label>
        <textarea class="form-input" id="importData" placeholder='粘贴 data.json 的内容...' style="min-height:80px;font-size:.78rem;font-family:monospace"></textarea>
        <button class="btn btn-secondary mt-8" id="btnImport" style="width:100%">📥 导入数据</button>
        <p class="text-sm mt-8" style="color:var(--red)">⚠️ 导入会覆盖现有数据，请先备份</p>
      </div>
    </div>`;

  document.getElementById('btnCloudSave').addEventListener('click', async () => {
    const token = document.getElementById('cloudToken').value.trim();
    cfg.token = token; saveSyncConfig(cfg);
    if (token) {
      const ok = await cloudDownload();
      if (ok) alert('✅ 已同步！云端数据已合并');
      else alert('⚠️ 云端暂无数据，请先上传');
      await cloudUpload();
    }
    updateSyncButtonState();
    closeModal();
  });

  document.getElementById('btnImport').addEventListener('click', () => {
    const raw = document.getElementById('importData').value.trim();
    if (!raw) { alert('请先粘贴数据'); return; }
    try {
      const data = JSON.parse(raw);
      if (!data.lessons && !data.logs) { alert('数据格式不正确，需要包含 lessons 或 logs'); return; }
      if (data.lessons) DB.saveLessons(data.lessons);
      if (data.logs) DB.saveLogs(data.logs);
      alert('✅ 导入成功！课程 ' + (data.lessons||[]).length + ' 条，练习 ' + (data.logs||[]).length + ' 条');
      closeModal();
      renderAll();
    } catch(e) {
      alert('❌ JSON 格式错误：' + e.message);
    }
  });
};

function updateSyncButtonState() {
  var btn = document.getElementById('syncBtn');
  if (!btn) return;
  var cfg = getSyncConfig();
  if (cfg.token) {
    btn.innerHTML = '☁️ 已同步';
    btn.className = 'sync-btn logged-in';
    btn.title = '云端同步已配置 · 点击管理';
  } else {
    btn.innerHTML = '🔑 登录同步';
    btn.className = 'sync-btn';
    btn.title = '设置 GitHub 云端同步';
  }
}

async function startupSync() {
  var cfg = getSyncConfig();
  if (!cfg.token) return;
  var ls = cfg.lastSync ? new Date(cfg.lastSync).getTime() : 0;
  if (Date.now() - ls > 600000) await cloudDownload(); // 10min throttle
}

(function initCloudSync() {
  startupSync();
})();

// ==================== INIT ====================
(function init() {
  try {
    initRepertoire();
    loadLogo();
    renderAll();

    // Register Service Worker for PWA offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  } catch (e) {
    var page = document.getElementById('page-today');
    if (page) {
      page.innerHTML = '<div class="card" style="background:rgba(232,160,160,.2);border-color:var(--red)"><h3>⚠️ 启动错误</h3><p style="font-size:.85rem;color:var(--red);word-break:break-all">' + e.message + '</p><p class="text-sm mt-8">请刷新页面重试，如果问题持续，检查浏览器控制台 (F12)</p></div>';
    }
    console.error('Piano app init error:', e);
  }
})();
</script>
</body>
</html>
