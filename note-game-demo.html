<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🎵 识谱练习</title>
<script src="vexflow.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A1D35; --text:#E8E8EE; --text2:#9898A8; --border:rgba(255,255,255,.15);
  --green:#8ED4A6; --red:#E8A0A0; --primary:#F5A098; --radius:16px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(170deg,#1A1D35,#1F2545,#1C2845,#1E2340,#1A1D35);
  background-attachment:fixed; color:var(--text);
  min-height:100dvh; display:flex; justify-content:center; align-items:center;
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:520px;padding:16px;text-align:center}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.timer{font-size:1.7rem;font-weight:800;color:var(--primary)}
.score{font-size:.88rem;color:var(--text2)}
.combo{font-size:.78rem;color:var(--green);margin-top:2px}
.stage{
  background:#fff;border-radius:var(--radius);padding:8px;margin-bottom:12px;
  overflow:hidden;height:160px;position:relative;z-index:1;
}
.stage svg{display:block;margin:0 auto;pointer-events:none}
.question{font-size:1.05rem;margin:6px 0 2px;font-weight:600}
.octave-hint{font-size:.78rem;color:var(--text2)}
.answers{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;position:relative;z-index:2}
.ans-btn{
  padding:12px 6px;border-radius:var(--radius);border:1px solid var(--border);
  background:rgba(255,255,255,.06);color:var(--text);font-size:.88rem;
  font-weight:700;cursor:pointer;transition:all .15s;min-height:44px;
}
.ans-btn:active{transform:scale(.95)}
.ans-btn.correct{background:rgba(142,212,166,.2);border-color:var(--green);color:var(--green)}
.ans-btn.wrong{background:rgba(232,160,160,.2);border-color:var(--red);color:var(--red)}
.feedback{font-size:1rem;min-height:26px}
.over{text-align:center}
.over h2{font-size:1.3rem;margin-bottom:6px}
.over .final{font-size:1.8rem;color:var(--primary);font-weight:800}
.over p{color:var(--text2);margin:3px 0}
.btn{padding:12px 28px;border:none;border-radius:50px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:10px;background:var(--primary);color:#fff}
.btn:active{transform:scale(.96)}
.settings{margin-bottom:10px}
.settings select{
  padding:6px 10px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.06);color:var(--text);font-size:.75rem;
}
.settings label{font-size:.73rem;color:var(--text2);margin-right:6px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="timer" id="timer">05:00</div>
    <div>
      <div class="score">⭐ <strong id="score">0</strong></div>
      <div class="combo" id="combo"></div>
    </div>
  </div>

  <div class="settings">
    <button id="modePractice" onclick="switchMode('practice')" style="font-size:.72rem;padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;opacity:.4">📝 练习</button>
    <button id="modeChallenge" onclick="switchMode('challenge')" style="font-size:.72rem;padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer">⚡ 挑战</button>
    <select id="levelSelect" onchange="switchLevel()" style="margin-left:6px"></select>
    <div style="font-size:.68rem;color:var(--text2);margin-top:4px" id="todayStats"></div>
  </div>

  <div class="stage" id="stage"></div>
  <div class="question">这个音是？</div>
  <div class="octave-hint" id="octaveHint"></div>

  <div class="answers" id="answers"></div>
  <div class="feedback" id="feedback"></div>

  <div class="over" id="over" style="display:none">
    <h2>🎉 时间到！</h2>
    <div class="final" id="finalScore">0</div>
    <p>答对 <span id="finalCorrect">0</span> 题</p>
    <p>最高连击 <span id="finalCombo">0</span></p>
    <p style="font-size:.8rem"><span id="todayStatsEnd"></span></p>
    <button class="btn" onclick="restart()">再来一次</button>
  </div>
</div>

<script>
var VF = Vex.Flow;
document.getElementById('stage').innerHTML = '<p style="padding:20px;color:#999">🎵 准备好了！</p>';

var FAMILIES = [
  { label:'爷爷', prefix:'爷爷的', midiBase:36, clef:'bass' },
  { label:'爸爸', prefix:'爸爸的', midiBase:48, clef:'bass' },
  { label:'宝宝', prefix:'宝宝的', midiBase:60, clef:'both' },
  { label:'妈妈', prefix:'妈妈的', midiBase:72, clef:'treble' },
  { label:'奶奶', prefix:'奶奶的', midiBase:84, clef:'treble' },
];
var SOLFEGE = ['do','re','mi','fa','sol','la','si'];
var NOTE_NAMES = ['C','D','E','F','G','A','B'];
var NOTE_KEYS = ['c','d','e','f','g','a','b'];

// ===== SOUND ENGINE =====
var audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playNote(midi, duration) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playCorrect() { playNote(currentNote ? currentNote.midi : 60, 0.4); }
function playWrong() {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain();
  osc.type = 'square'; osc.frequency.value = 200;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

// ===== DIFFICULTY LEVELS =====
var LEVELS = [
  { name:'入门', desc:'宝宝 octave · 5个音', families:[{label:'宝宝',midiBase:60}], notes:[0,1,2,3,4], clef:'treble' },
  { name:'初级', desc:'宝宝 完整八度 · 7个音', families:[{label:'宝宝',midiBase:60}], notes:[0,1,2,3,4,5,6], clef:'treble' },
  { name:'中级', desc:'宝宝+妈妈 · 高音谱号', families:[{label:'宝宝',midiBase:60},{label:'妈妈',midiBase:72}], notes:[0,1,2,3,4,5,6], clef:'treble' },
  { name:'进阶', desc:'爸爸+宝宝 · 高音+低音', families:[{label:'爸爸',midiBase:48},{label:'宝宝',midiBase:60}], notes:[0,1,2,3,4,5,6], clef:'both' },
  { name:'挑战', desc:'爸爸~奶奶 · 全部音域', families:FAMILIES.slice(1), notes:[0,1,2,3,4,5,6], clef:'both' },
];
var currentLevel = 0;

// ===== GAME STATE =====
var GAME_MODE = 'challenge'; // 'practice' | 'challenge'
var timerSec = 300, timerInterval = null;
var score = 0, combo = 0, maxCombo = 0, correctCount = 0, wrongCount = 0;
var currentNote = null, gameRunning = false, answering = false;

function renderNote(note) {
  var stage = document.getElementById('stage');
  stage.innerHTML = '';

  var renderer = new VF.Renderer(stage, VF.Renderer.Backends.SVG);
  renderer.resize(340, 150);
  var ctx = renderer.getContext();

  var stave = new VF.Stave(10, 30, 320);
  stave.addClef(note.clef === 'treble' ? 'treble' : 'bass');
  stave.setContext(ctx).draw();

  var octave = Math.floor(note.midi / 12) - 1;
  var key = NOTE_KEYS[note.noteIdx] + '/' + octave;
  var vfNote = new VF.StaveNote({ clef: note.clef === 'treble' ? 'treble' : 'bass', keys: [key], duration: 'q', auto_stem: true });

  // Create a voice and add the note
  var voice = new VF.Voice({ num_beats: 1, beat_value: 4 });
  voice.addTickable(vfNote);

  // Format and draw
  new VF.Formatter().joinVoices([voice]).format([voice], 200);
  voice.draw(ctx, stave);
}

function newQuestion() {
  if (!gameRunning) return;
  var range = document.getElementById('rangeSelect').value;
  var families;
  if (range === 'treble') families = FAMILIES.filter(function(f) { return f.clef === 'treble' || f.clef === 'both'; });
  else if (range === 'bass') families = FAMILIES.filter(function(f) { return f.clef === 'bass' || f.clef === 'both'; });
  else families = FAMILIES;

  var fam = families[Math.floor(Math.random() * families.length)];
  var ni = Math.floor(Math.random() * 7);
  var midi = fam.midiBase + ni;
  var clef = midi <= 60 ? 'bass' : 'treble';

  currentNote = {
    midi: midi, clef: clef, noteIdx: ni,
    noteName: NOTE_NAMES[ni],
    solfege: SOLFEGE[ni],
    family: fam.label,
    fullLabel: fam.prefix + SOLFEGE[ni],
  };

  renderNote(currentNote);

  document.getElementById('octaveHint').textContent = '哪个唱名？';
  document.getElementById('feedback').textContent = '';
  answering = false;
  var btns = document.querySelectorAll('.ans-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('correct','wrong'); }
}

function checkAnswer(noteIdx, btn) {
  if (!gameRunning || answering || !currentNote) return;
  initAudio();
  answering = true;
  if (noteIdx === currentNote.noteIdx) {
    btn.classList.add('correct');
    score++; combo++; correctCount++;
    if (combo > maxCombo) maxCombo = combo;
    document.getElementById('score').textContent = score;
    document.getElementById('combo').textContent = combo > 1 ? '🔥 '+combo+' 连击！' : '';
    document.getElementById('feedback').innerHTML =
      '<span style="color:var(--green)">✅ 对啦！' + currentNote.family + '八度 · ' + currentNote.noteName + '（' + currentNote.solfege + '）</span>';
    playCorrect();
    saveStats();
  } else {
    btn.classList.add('wrong');
    combo = 0; wrongCount++;
    document.getElementById('combo').textContent = '';
    document.getElementById('feedback').innerHTML =
      '<span style="color:var(--red)">✗ 应该是 ' + currentNote.family + '八度 · ' + currentNote.noteName + '（' + currentNote.solfege + '）</span>';
    var btns = document.querySelectorAll('.ans-btn');
    for (var i = 0; i < btns.length; i++) {
      if (parseInt(btns[i].dataset.note) === currentNote.noteIdx) btns[i].classList.add('correct');
    }
    playWrong();
  }
  setTimeout(newQuestion, GAME_MODE === 'challenge' ? 800 : 1200);
}

function updateTimer() {
  if (GAME_MODE === 'practice') { document.getElementById('timer').textContent = '∞'; return; }
  var m = Math.floor(timerSec/60), s = timerSec%60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if (timerSec <= 0) { endGame(); return; }
  timerSec--;
}

function saveStats() {
  var d = new Date().toISOString().slice(0,10);
  var stats = JSON.parse(localStorage.getItem('note_game_stats') || '{}');
  if (!stats[d]) stats[d] = {correct:0, wrong:0, maxCombo:0};
  stats[d].correct = (stats[d].correct||0) + 1;
  stats[d].maxCombo = Math.max(stats[d].maxCombo||0, combo);
  localStorage.setItem('note_game_stats', JSON.stringify(stats));
}

function loadStats() {
  var d = new Date().toISOString().slice(0,10);
  var stats = JSON.parse(localStorage.getItem('note_game_stats') || '{}');
  return stats[d] || {correct:0, wrong:0, maxCombo:0};
}

function startGame() {
  score=0; combo=0; maxCombo=0; correctCount=0; wrongCount=0; timerSec=300;
  document.getElementById('score').textContent='0';
  document.getElementById('combo').textContent='';
  document.getElementById('timer').textContent = GAME_MODE === 'practice' ? '∞' : '05:00';
  document.getElementById('stage').style.display='block';
  document.getElementById('answers').style.display='grid';
  document.getElementById('over').style.display='none';
  document.getElementById('feedback').textContent='';
  // Build level selector
  var sel = document.getElementById('levelSelect');
  var lvlHTML = '';
  for (var li = 0; li < LEVELS.length; li++) {
    lvlHTML += '<option value="'+li+'"'+(li===currentLevel?' selected':'')+'>'+LEVELS[li].name+' · '+LEVELS[li].desc+'</option>';
  }
  if (sel) sel.innerHTML = lvlHTML;
  var html = '';
  for (var i = 0; i < SOLFEGE.length; i++) {
    html += '<button class="ans-btn" data-note="'+i+'" onclick="checkAnswer('+i+',this)">'+SOLFEGE[i]+'<br><span style="font-size:.65rem;font-weight:400;color:var(--text3)">'+NOTE_NAMES[i]+'</span></button>';
  }
  document.getElementById('answers').innerHTML = html;
  // Show today stats
  var today = loadStats();
  document.getElementById('todayStats').textContent = '今日 ✅'+today.correct+' ✗'+today.wrong+' 🔥'+today.maxCombo;
  gameRunning=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  newQuestion();
}

function endGame() {
  gameRunning=false; clearInterval(timerInterval);
  document.getElementById('stage').style.display='none';
  document.getElementById('answers').style.display='none';
  document.getElementById('over').style.display='block';
  document.getElementById('finalScore').textContent=score+' 分';
  document.getElementById('finalCorrect').textContent=correctCount;
  document.getElementById('finalCombo').textContent=maxCombo;
  document.getElementById('feedback').textContent='';
  var today = loadStats();
  document.getElementById('todayStatsEnd').textContent = '今日累计 ✅'+today.correct+' ✗'+today.wrong+' 🔥'+today.maxCombo;
}

function restart(){ clearInterval(timerInterval); startGame(); }
function switchMode(mode) {
  GAME_MODE = mode;
  document.getElementById('modePractice').style.opacity = mode==='practice' ? '1' : '.4';
  document.getElementById('modeChallenge').style.opacity = mode==='challenge' ? '1' : '.4';
  restart();
}
function switchLevel() {
  currentLevel = parseInt(document.getElementById('levelSelect').value);
  restart();
}
startGame();
</script>
</body>
</html>
